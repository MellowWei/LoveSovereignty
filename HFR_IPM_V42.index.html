<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HFR_IPM_V5.2 | 因果暖房</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFDFB; --ink: #2C2C2C; --dim: #A6A6A6; --trace: #E8D3B9; --accent: #E5989B; --heart: #FFB4B4; }
        body { margin: 0; font-family: 'Noto Serif SC', serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; overflow: hidden; }
        .app-shell { display: grid; grid-template-columns: 450px 1fr; width: 100%; height: 100vh; }
        
        .sidebar { border-right: 1px solid #EEE; padding: 40px; height: 100vh; overflow-y: auto; scrollbar-width: none; background: #fff; }
        .header { font-family: 'Ma Shan Zheng'; font-size: 24px; border-bottom: 1px solid var(--trace); padding-bottom: 10px; margin-bottom: 25px; letter-spacing: 2px; color: #5D5D5D; }
        
        .love-zone { background: #FFF9F9; padding: 18px; border-radius: 12px; border: 1px solid var(--heart); margin-bottom: 25px; }
        .love-head { display: flex; justify-content: space-between; font-size: 13px; font-weight: 900; margin-bottom: 10px; color: var(--accent); }
        .love-slider { width: 100%; height: 4px; appearance: none; background: #FFE4E4; outline: none; border-radius: 10px; }
        .love-slider::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: var(--accent); border: 3px solid #FFF; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .input-block { margin-bottom: 25px; }
        .label-love { font-size: 13px; font-weight: 900; margin-bottom: 8px; display: block; color: #7D7D7D; }
        .desc-love { font-size: 11px; color: var(--dim); margin-bottom: 10px; display: block; line-height: 1.5; }
        .textarea-box { border: 1px solid #EEE; padding: 12px; background: #FCFCFC; border-radius: 8px; transition: 0.3s; }
        .textarea-box:focus-within { border-color: var(--accent); background: #FFF; box-shadow: 0 4px 12px rgba(229,152,155,0.1); }
        textarea { width: 100%; border: none; outline: none; resize: none; font-size: 14px; line-height: 1.6; font-family: inherit; background: transparent; height: 50px; }

        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .meta-item label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 5px; }
        .meta-item input { width: 100%; border: none; border-bottom: 1px solid #EEE; text-align: center; font-family: 'Ma Shan Zheng'; font-size: 22px; outline: none; padding: 5px 0; color: var(--accent); }

        .dim-group { margin-bottom: 30px; }
        .dim-title { font-weight: 900; font-size: 14px; margin-bottom: 15px; color: #555; display: flex; align-items: center; }
        .dim-title::before { content: '❤'; margin-right: 8px; color: var(--heart); font-size: 10px; }
        
        .slider-unit { margin-bottom: 18px; }
        .slider-head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #888; }
        input[type="range"].main-range { width: 100%; height: 2px; appearance: none; background: #EEE; outline: none; }
        input[type="range"].main-range::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: #CCC; border-radius: 50%; transition: 0.3s; }
        input[type="range"].main-range::-webkit-slider-thumb:hover { background: var(--accent); transform: scale(1.2); }

        .stage { background: radial-gradient(circle at center, #FFF, #FDFCFB); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; position: relative; flex: 1; }
        .heart-orb { 
            width: 400px; height: 400px; border-radius: 50%; border: 1px solid #F0F0F0; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            position: relative; overflow: hidden; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.03); 
        }
        .bloom-fill { position: absolute; bottom: 0; width: 100%; background: var(--heart); opacity: 0.6; transition: height 1.2s cubic-bezier(0.23, 1, 0.32, 1); }
        .prob-display { font-family: 'Ma Shan Zheng'; font-size: 90px; z-index: 10; color: var(--ink); line-height: 1; }
        
        #insight-panel { margin-top: 40px; max-width: 500px; text-align: center; }
        .love-msg { font-size: 15px; color: #444; font-weight: 600; margin-bottom: 12px; letter-spacing: 0.5px; }
        .support-msg { font-size: 12px; color: var(--dim); font-style: italic; line-height: 1.8; }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="header">因果暖房 · HFR V5.2</div>
        
        <div class="love-zone">
            <div class="love-head"><span>期待程度 (愿力)</span><span id="target-display">50%</span></div>
            <input type="range" class="love-slider" id="target-p" min="0" max="100" value="50">
        </div>

        <div class="input-block">
            <label class="label-love">当下的陪伴 (前置行动)</label>
            <span class="desc-love">魏珏然，你此时此刻正在为它播撒什么？具体的行动是最好的爱。</span>
            <div class="textarea-box"><textarea id="pre-action" placeholder="哪怕是一小步..." oninput="Engine.calc()"></textarea></div>
        </div>

        <div class="input-block">
            <label class="label-love">心中的风景 (美好愿景)</label>
            <span class="desc-love">描述那个让你感到温暖的终点。</span>
            <div class="textarea-box"><textarea id="wish-desc" placeholder="愿望的样子..." oninput="Engine.calc()"></textarea></div>
        </div>
        
        <div class="meta-grid">
            <div class="meta-item">
                <label>外部慈悲 (环境包容度)</label>
                <input type="number" id="ext-dep" value="3.5" step="0.1" max="5" min="0" oninput="Engine.calc()">
            </div>
            <div class="meta-item">
                <label>静待花开 (时间宽容)</label>
                <input type="number" id="time-horizon" value="3.0" step="0.1" max="5" min="0" oninput="Engine.calc()">
            </div>
        </div>

        <div id="slider-root"></div>
    </aside>

    <main class="stage">
        <div class="heart-orb">
            <div id="wave" class="bloom-fill"></div>
            <div id="prob" class="prob-display">0%</div>
            <div id="zen" style="font-size:14px; letter-spacing:4px; z-index:10; color:#888; margin-top:10px">正在感应</div>
        </div>
        <div id="insight-panel">
            <div id="logic-info" class="love-msg">万物静默，等待你的律动。</div>
            <div id="support-3" class="support-msg"></div>
        </div>
    </main>
</div>

<script>
// 赋能型矩阵配置：将逻辑转化为“支持体系”
const Matrix = [
    { id: 'nurture', name: '养分储备 (资源与环境)', weight: 30, fields: ['物理路径的完整', '所需能量的丰盈'] },
    { id: 'devotion', name: '心力投入 (意志与执行)', weight: 40, fields: ['专注的深度', '跨越阻碍的温柔'] },
    { id: 'kindness', name: '世间善意 (外部对齐)', weight: 30, fields: ['他人的共鸣', '系统的护航'] }
];

let Vals = {};

const Engine = {
    init() { this.render(); this.calc(); },
    render() {
        const root = document.getElementById('slider-root');
        root.innerHTML = Matrix.map(m => `
            <div class="dim-group">
                <div class="dim-title">${m.name}</div>
                ${m.fields.map((f, i) => {
                    const key = m.id + '_' + i; Vals[key] = 3.0;
                    return `
                        <div class="slider-unit">
                            <div class="slider-head"><span>${f}</span><span id="v-${key}">3.0</span></div>
                            <input type="range" class="main-range" min="0" max="5" step="0.1" value="3" oninput="Engine.update('${key}', this.value)">
                        </div>`;
                }).join('')}
            </div>`).join('');
    },
    update(k, v) { 
        Vals[k] = parseFloat(v); 
        document.getElementById(`v-${k}`).innerText = parseFloat(v).toFixed(1); 
        this.calc(); 
    },
    calc() {
        let totalScore = 0;
        Matrix.forEach(m => {
            let dimSum = 0;
            m.fields.forEach((_, i) => dimSum += Vals[m.id + '_' + i]);
            totalScore += (dimSum / m.fields.length / 5) * m.weight;
        });

        const ext = parseFloat(document.getElementById('ext-dep').value) || 0;
        const penalty = ((5 - ext) / 5) * 0.25; // 缺乏外部慈悲时的折损
        
        let p = totalScore * (1 - penalty);
        
        const pre = document.getElementById('pre-action').value.trim();
        const wish = document.getElementById('wish-desc').value.trim();
        
        // 掌控者的温柔增益：有具体的行动，因果更稳固
        if (pre.length > 5) p *= 1.1;
        if (/爱|温暖|共振|陪伴/.test(wish)) p *= 1.05;

        p = Math.max(1, Math.min(98, p));
        const finalP = Math.round(p);

        document.getElementById('prob').innerText = finalP + "%";
        document.getElementById('wave').style.height = finalP + "%";
        
        this.updateLoveInsight(finalP);
    },
    updateLoveInsight(p) {
        const info = document.getElementById('logic-info');
        const support = document.getElementById('support-3');
        const zen = document.getElementById('zen');

        if (p > 80) {
            info.innerText = "“这颗种子已感受到你的爱，正加速破土。”";
            zen.innerText = "因果圆满";
        } else if (p > 50) {
            info.innerText = "“只要你持续给予心力，它便会向光生长。”";
            zen.innerText = "春生夏长";
        } else {
            info.innerText = "“此刻它需要你更多的耐心与具体的陪伴。”";
            zen.innerText = "潜龙在渊";
        }

        let scores = Matrix.map(m => {
            let sum = 0;
            m.fields.forEach((_, i) => sum += Vals[m.id + '_' + i]);
            return { name: m.name.split(' ')[0], avg: sum / m.fields.length };
        }).sort((a,b) => a.avg - b.avg);

        support.innerText = `小贴士：多给「${scores[0].name}」一点滋养，因果会流动得更顺畅。`;
    }
};

window.onload = () => Engine.init();
</script>
</body>
</html>

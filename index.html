<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoveSovereignty | 因果律动终端</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFDFB; --ink: #2C2C2C; --dim: #A6A6A6; --trace: #E8D3B9; --accent: #E5989B; --heart: #FFB4B4; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Noto Serif SC', serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; overflow-x: hidden; }
        
        .app-shell { display: grid; grid-template-columns: 450px 1fr; width: 100%; height: 100vh; }

        /* 侧边栏 */
        .sidebar { border-right: 1px solid #F0F0F0; padding: 40px; height: 100vh; overflow-y: auto; scrollbar-width: none; background: #fff; z-index: 10; }
        .sidebar::-webkit-scrollbar { width: 0; }
        .header { font-family: 'Ma Shan Zheng'; font-size: 28px; border-bottom: 2px solid var(--trace); padding-bottom: 12px; margin-bottom: 30px; letter-spacing: 3px; color: #444; }
        
        /* 交互块 */
        .control-group { background: #FFF9F9; padding: 20px; border-radius: 14px; border: 1px solid var(--heart); margin-bottom: 25px; }
        .group-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 900; margin-bottom: 12px; color: var(--accent); }
        .slider-bar { width: 100%; height: 4px; appearance: none; background: #FFE4E4; border-radius: 10px; outline: none; cursor: pointer; }
        .slider-bar::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--accent); border: 3px solid #FFF; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        .input-area { margin-bottom: 25px; }
        .label-zen { font-size: 13px; font-weight: 900; color: #666; margin-bottom: 10px; display: block; }
        .input-wrap { border: 1px solid #EEE; padding: 14px; background: #FCFCFC; border-radius: 10px; transition: all 0.4s; }
        .input-wrap:focus-within { border-color: var(--accent); background: #FFF; box-shadow: 0 6px 15px rgba(229,152,155,0.08); }
        textarea { width: 100%; border: none; outline: none; resize: none; font-size: 14px; line-height: 1.7; font-family: inherit; background: transparent; height: 55px; color: #333; }

        .meta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .meta-box label { font-size: 11px; color: var(--dim); margin-bottom: 6px; display: block; }
        .meta-box input { width: 100%; border: none; border-bottom: 2px solid #F0F0F0; text-align: center; font-family: 'Ma Shan Zheng'; font-size: 24px; outline: none; color: var(--accent); padding: 4px 0; background: transparent; }

        .dim-item { margin-bottom: 22px; }
        .dim-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #888; }
        
        /* 核心视觉区 */
        .stage { background: #FFF; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; flex: 1; min-height: 500px; }
        .orb-container { 
            width: 420px; height: 420px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.03); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            position: relative; overflow: hidden; background: #FFF; box-shadow: 0 30px 80px rgba(0,0,0,0.03); 
        }
        .fill-layer { position: absolute; bottom: 0; width: 100%; background: var(--heart); opacity: 0.45; transition: height 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .prob-text { font-family: 'Ma Shan Zheng'; font-size: 100px; z-index: 10; color: var(--ink); line-height: 1; letter-spacing: -2px; }
        
        .status-bar { margin-top: 40px; text-align: center; max-width: 500px; padding: 0 20px; }
        .main-insight { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 12px; letter-spacing: 0.5px; }
        .sub-hint { font-size: 12px; color: var(--dim); font-style: italic; line-height: 1.8; border-top: 1px solid #F5F5F5; padding-top: 12px; }
        .tag { position: absolute; top: 30px; left: 30px; font-size: 10px; letter-spacing: 2px; color: var(--trace); font-weight: 900; }

        /* 手机端自适应 */
        @media (max-width: 850px) {
            body { overflow-y: auto; display: block; }
            .app-shell { display: block; height: auto; }
            .sidebar { width: 100%; height: auto; padding: 30px 20px; border-right: none; border-bottom: 1px solid #EEE; overflow-y: visible; }
            .stage { padding: 50px 10px; min-height: 550px; }
            .orb-container { width: 320px; height: 320px; }
            .prob-text { font-size: 80px; }
            .header { font-size: 24px; text-align: center; }
            .slider-bar::-webkit-slider-thumb { width: 26px; height: 26px; }
            .tag { top: 20px; left: 20px; font-size: 8px; }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="header">LoveSovereignty</div>
        
        <div class="control-group">
            <div class="group-label"><span>愿力校准 (Target)</span><span id="target-val">50%</span></div>
            <input type="range" class="slider-bar" id="target-slider" min="0" max="100" value="50" oninput="updateTarget(this.value)">
        </div>

        <div class="input-area">
            <label class="label-zen">当下之种 (Kinetics)</label>
            <div class="input-wrap"><textarea id="pre-action" placeholder="此刻正在执行什么具体的物理动作？" oninput="Engine.calc()"></textarea></div>
        </div>

        <div class="input-area">
            <label class="label-zen">视界锚点 (Vision)</label>
            <div class="input-wrap"><textarea id="wish-desc" placeholder="描述此愿达成时的共振场景..." oninput="Engine.calc()"></textarea></div>
        </div>
        
        <div class="meta-row">
            <div class="meta-box"><label>外部慈悲 (Mercy)</label><input type="number" id="ext-dep" value="3.5" step="0.1" max="5" min="0" oninput="Engine.calc()"></div>
            <div class="meta-box"><label>静待期 (Tempo)</label><input type="number" id="time-horizon" value="3.0" step="0.1" max="5" min="0" oninput="Engine.calc()"></div>
        </div>

        <div id="dim-root"></div>
    </aside>

    <main class="stage">
        <div class="tag">LOVESOVEREIGNTY_V5.3_PRO</div>
        <div class="orb-container">
            <div id="wave" class="fill-layer"></div>
            <div id="prob" class="prob-text">0%</div>
            <div id="zen" style="font-size:13px; letter-spacing:8px; z-index:10; color:#999; margin-top:15px; font-weight:200;">感知律动</div>
        </div>
        <div class="status-bar">
            <div id="logic-info" class="main-insight">万物静默，等待拨动。</div>
            <div id="support-msg" class="sub-hint"></div>
        </div>
    </main>
</div>

<script>
const Matrix = [
    { id: 'nurture', name: '养分储备', weight: 30, fields: ['资源丰盈度', '路径清晰度'] },
    { id: 'devotion', name: '心力投入', weight: 50, fields: ['意志的纯度', '执行的深度'] },
    { id: 'kindness', name: '世间善意', weight: 20, fields: ['环境包容度', '外部支持率'] }
];

let Vals = {};

function updateTarget(v) {
    document.getElementById('target-val').innerText = v + '%';
    Engine.calc();
}

const Engine = {
    init() { this.render(); this.calc(); },
    render() {
        const root = document.getElementById('dim-root');
        root.innerHTML = Matrix.map(m => `
            <div class="dim-item">
                <div style="font-size:13px; font-weight:900; margin-bottom:12px; display:flex; justify-content:space-between">
                    <span>${m.name}</span><span style="font-size:10px; opacity:0.4">${m.weight}%</span>
                </div>
                ${m.fields.map((f, i) => {
                    const key = m.id + '_' + i; Vals[key] = 3.0;
                    return `
                        <div style="margin-bottom:14px">
                            <div class="dim-info"><span>${f}</span><span id="v-${key}">3.0</span></div>
                            <input type="range" class="slider-bar" style="height:2px" min="0" max="5" step="0.1" value="3" oninput="Engine.update('${key}', this.value)">
                        </div>`;
                }).join('')}
            </div>`).join('');
    },
    update(k, v) { 
        Vals[k] = parseFloat(v); 
        document.getElementById(`v-${k}`).innerText = parseFloat(v).toFixed(1); 
        this.calc(); 
    },
    calc() {
        let baseScore = 0;
        Matrix.forEach(m => {
            let sum = 0;
            m.fields.forEach((_, i) => sum += Vals[m.id + '_' + i]);
            baseScore += (sum / m.fields.length / 5) * m.weight * 0.85; 
        });

        const ext = parseFloat(document.getElementById('ext-dep').value) || 0;
        const mercyFactor = 0.75 + (ext / 5) * 0.3; 

        const pre = document.getElementById('pre-action').value.trim();
        const wish = document.getElementById('wish-desc').value.trim();
        let bonus = 0;
        if (pre.length > 5) bonus += 3;
        if (pre.length > 25) bonus += 6;
        if (pre.length > 70) bonus += 10;
        
        let p = (baseScore + bonus) * mercyFactor;

        if (/爱|共振|陪伴|温暖|sovereignty/i.test(wish) && pre.length > 10) p += 5.5;

        p = Math.max(1, Math.min(99.4, p));
        const finalP = p.toFixed(1);

        document.getElementById('prob').innerText = finalP + "%";
        document.getElementById('wave').style.height = finalP + "%";
        this.updateFeedback(p);
    },
    updateFeedback(p) {
        const info = document.getElementById('logic-info');
        const hint = document.getElementById('support-msg');
        const zen = document.getElementById('zen');

        if (p > 88) {
            info.innerText = "“主权完全确立。请收割当下的现实。”";
            zen.innerText = "因果圆满";
        } else if (p > 65) {
            info.innerText = "“高频震荡期。爱与主权正在深度同调。”";
            zen.innerText = "夏花烂漫";
        } else if (p > 40) {
            info.innerText = "“蓄能中。增加物理践行深度以维持频率。”";
            zen.innerText = "春雨细润";
        } else {
            info.innerText = "“念力尚未具象。请给予更多具体的滋养。”";
            zen.innerText = "潜龙在渊";
        }

        let low = Matrix.map(m => {
            let s = 0; m.fields.forEach((_, i) => s += Vals[m.id + '_' + i]);
            return { n: m.name, a: s/m.fields.length };
        }).sort((a,b) => a.a - b.a)[0];

        hint.innerText = `系统提示：当前瓶颈位于「${low.n}」，该维度的缺失正限制因果坍缩。`;
    }
};

window.onload = () => Engine.init();
</script>
</body>
</html>
